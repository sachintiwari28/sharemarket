name: Update Stock Data

on:
  schedule:
    # Runs at 4:00 PM IST, which is 10:30 AM UTC, every day
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pandas pygrowwapi

    - name: Run the scraper
      run: python update_stock_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/stock_history.csv
        git commit -m "Automated stock data update" || echo "No changes to commit"
        git push
