<!DOCTYPE html>
<html>
<head>
    <title>Investment Screener</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
        .positive { color: green; }
        .negative { color: red; }
        button { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        input { padding: 8px; margin-right: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📈 Stock & Mutual Fund Screener</h1>
    
    <div class="card">
        <h2>🔥 Top Stock Opportunities (Local Low + Growth)</h2>
        <table id="stockTable">
            <thead><tr><th>Symbol</th><th>Price (₹)</th><th>Predicted 2M Profit %</th><th>Confidence %</th><th>Action</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>📊 Mutual Funds – Top 5 Gainers (1 week)</h2>
        <table id="gainersTable"><thead><tr><th>Name</th><th>NAV (₹)</th><th>Week Return %</th></tr></thead><tbody></tbody></table>
        <h3>📉 Top 5 Losers (1 week)</h3>
        <table id="losersTable"><thead><tr><th>Name</th><th>NAV (₹)</th><th>Week Return %</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="card">
        <h2>💰 Investment Snapshot</h2>
        <select id="stockSelect"></select>
        <input type="number" id="amount" placeholder="Amount (₹)" value="10000">
        <button onclick="getSnapshot()">Check Profit & Confidence</button>
        <div id="snapshotResult" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    async function loadStocks() {
        const res = await fetch('/api/opportunities');
        const stocks = await res.json();
        const tbody = document.querySelector('#stockTable tbody');
        const select = document.getElementById('stockSelect');
        tbody.innerHTML = '';
        select.innerHTML = '';
        stocks.forEach(s => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = s.symbol;
            row.insertCell(1).innerText = s.current_price;
            row.insertCell(2).innerHTML = `<span class="positive">+${s.predicted_profit_pct}%</span>`;
            row.insertCell(3).innerText = s.confidence;
            const btnCell = row.insertCell(4);
            const btn = document.createElement('button');
            btn.innerText = 'Analyze';
            btn.onclick = () => {
                document.getElementById('stockSelect').value = s.symbol;
                document.getElementById('amount').value = 10000;
                getSnapshot();
            };
            btnCell.appendChild(btn);
            // populate dropdown
            const option = document.createElement('option');
            option.value = s.symbol;
            option.innerText = s.symbol;
            select.appendChild(option);
        });
    }

    async function loadMutualFunds() {
        const res = await fetch('/api/mutual_funds');
        const data = await res.json();
        const gainerBody = document.querySelector('#gainersTable tbody');
        const loserBody = document.querySelector('#losersTable tbody');
        gainerBody.innerHTML = '';
        loserBody.innerHTML = '';
        data.gainers.forEach(f => {
            const row = gainerBody.insertRow();
            row.insertCell(0).innerText = f.name;
            row.insertCell(1).innerText = f.nav;
            row.insertCell(2).innerHTML = `<span class="positive">+${f.week_return}%</span>`;
        });
        data.losers.forEach(f => {
            const row = loserBody.insertRow();
            row.insertCell(0).innerText = f.name;
            row.insertCell(1).innerText = f.nav;
            row.insertCell(2).innerHTML = `<span class="negative">${f.week_return}%</span>`;
        });
    }

    async function getSnapshot() {
        const symbol = document.getElementById('stockSelect').value;
        const amount = document.getElementById('amount').value;
        if (!symbol) return;
        const res = await fetch('/api/invest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol, amount: parseFloat(amount) })
        });
        const data = await res.json();
        const resultDiv = document.getElementById('snapshotResult');
        if (data.error) {
            resultDiv.innerHTML = `<p style="color:red">${data.error}</p>`;
        } else {
            resultDiv.innerHTML = `
                <p>✅ <strong>${data.symbol}</strong></p>
                <p>Invest: ₹${data.amount}</p>
                <p>📈 Predicted profit: ₹${data.predicted_profit_amount} (${data.predicted_profit_pct}%)</p>
                <p>🎯 Confidence score: ${data.confidence}%</p>
                <p>💡 ${data.advice}</p>
            `;
        }
    }

    loadStocks();
    loadMutualFunds();
    setInterval(() => { loadStocks(); loadMutualFunds(); }, 3600000); // refresh every hour
</script>
</body>
</html>
